name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build all packages (dist required for cross-pkg + example typecheck)
        run: bun run --filter './packages/*' build

      - name: Typecheck
        run: bun run --filter '*' typecheck
