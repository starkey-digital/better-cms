name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build main pkg (provides dist for examples to typecheck against)
        run: bun run --filter better-cms build

      - name: Typecheck
        run: bun run --filter '*' typecheck
