name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'starkey-digital/better-cms'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Verify tag commit is on main
        run: |
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" HEAD; then
            echo "::error::tag ${GITHUB_REF_NAME} (${GITHUB_SHA}) is not on main — refusing to release"
            exit 1
          fi

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Derive version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "::error::tag ${GITHUB_REF_NAME} is not a valid semver"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $VERSION"

      - name: Bump packages + plugin to ${{ steps.ver.outputs.version }}
        run: bun scripts/bump-version.ts "${{ steps.ver.outputs.version }}"

      - name: Refresh lockfile
        run: bun install --no-frozen-lockfile

      - name: Commit bump back to main
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet HEAD; then
            echo "no version changes (already at ${{ steps.ver.outputs.version }})"
          else
            git add -A
            git commit -m "release: v${{ steps.ver.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Configure npm auth (literal token — bun publish doesn't expand env in .npmrc)
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build
        run: bun run --filter better-cms build

      - name: Publish to npm
        run: bun scripts/publish-all.ts

      - name: Create GitHub release
        run: |
          NOTES_FILE="changelog/RELEASE_${GITHUB_REF_NAME}.md"
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "release ${GITHUB_REF_NAME} already exists, skipping creation"
          elif [ -f "$NOTES_FILE" ]; then
            gh release create "${GITHUB_REF_NAME}" --title "Release ${GITHUB_REF_NAME}" --notes-file "$NOTES_FILE"
          else
            gh release create "${GITHUB_REF_NAME}" --title "Release ${GITHUB_REF_NAME}" --generate-notes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
