name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'starkey-digital/better-cms'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.7

      - name: Verify package versions match tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(jq -r .version packages/better-cms/package.json)
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match package version $PKG_VERSION — run 'bun run bump $TAG' before tagging"
            exit 1
          fi
          echo "✓ tag matches package version: $PKG_VERSION"

      - name: Configure npm auth (literal token — bun publish doesn't expand env in .npmrc)
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run --filter better-cms build

      - name: Publish to npm
        run: bun scripts/publish-all.ts

      - name: Create GitHub release notes (if changelog exists)
        run: |
          NOTES_FILE="changelog/RELEASE_${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            gh release create "$GITHUB_REF_NAME" --title "Release $GITHUB_REF_NAME" --notes-file "$NOTES_FILE" || echo "release already exists, skipping"
          else
            gh release create "$GITHUB_REF_NAME" --title "Release $GITHUB_REF_NAME" --generate-notes || echo "release already exists, skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
